front:
  text: 真人高象先金丹歌高先字象先朐陽人也余素昧平生祥符六年因四明傳神僧禹昌始得識公面於京師佳其負才學而輕名位陶陶然以酒自娱又視其眼光溢臉歎曰真明了人也始與定交然莫測有他術洎七年秋觀公承醉答諸宫高貟外歌一首幾二千言雖朝上帝問道西華率皆寓言其排邪斥僞矯正歸真真一之道也余不佞春秋六十四矣學道四十年間百師千友萬言億術皆蒙蒙相授迷迷相指其皎然明白若象先是歌者未之前聞余懼覽者目爲狂怪之詞不悟至眞之道遂爲注解以示將來
  hash: sha256:03f3259f20fa7d91a8d9b2a1c96b8811923685ec85c0f4390454d0a497ac47b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0102_HFL_000-001a, image: hfl/0740/0740-170.png}
body:
  text: 歌曰東海高先真作怪一箇了心無比大塞破乾坤造化爐跳出隂陽生死海雄哉權握天地機上蒼不許自身奇閑談王霸渾多事鋒鋩不露將誰知憶昔余年十四五明經早欲干明主壯心不伏低時才遂弄牋毫業詞賦賦成齷齪翻自鄙篆刻彫蟲安足貴旋操洪筆落宏詞將應大中天子制前年攘臂來京輦曼倩飛書方自薦酒酣覽鏡照客容遽駭潘安鬢華變捨鑑撫膺吁自語倏忽浮榮寧足慕金闕遂抛方正科玉京上應神仙舉神仙舉業竟何以萬卷無師問深㫖何殊乘艦泛尾閭南北東西渺無際八月十五天清明閉關思道心冥冥兀然四大生虚白不覺一靈昇太清太清四顧何漫漫水晶宫殿冰相攢巍巍雙闕横雲端玉牌金篆題廣寒廣寒宫中有平道倒景未昇天未曉絳鳳紫鸞栖碧林白鹿黄猿睡瑶草以指叩關聲未已有吏開關問行止遽報高先字象先思真不覺飛魂至仙官得㫖忻然入有頃雙童出相揖玉宸有命召先生霞披飄飄玉趾急雙童引去黄金砌絳節霓旌森羽衛雉扇雙開見粹容再拜鞠躬俟天意玉宸謂我凡間子矣矣修真肯如此急徵仙籍問仙名仙官答云有名字舉世何人識河車子當西去求西華西華夫人掌樞紐使當指與真丹砂仍命雙童爲前導縹縹渺渺凌飛霞百萬里兮何咫尺倏然已抵金天涯朱曦半出扶桑東輕雲夾之光曈曚百花摘引如長虹抓楹攫檻皆虬龍琳琅琪樹何青葱天風四觸聲玲瓏珠璣寳殿森其中雙童指曰西華宫宫中綵仗何昭晰有女方年十七八鬢髮繽紛垂暮雲素容輕淡凝春雪雙童前宣玉宸㫖送到象先高處士已題仙籍有仙名夫人爲指長生理夫人受命雙童去揖坐從容與仙語萬卷仙經傳世間不遇真人安得悟夫人爲我張華筵珊瑚玳瑁寒相鮮紛羽駕兮飛雲軿召雙童兮邀綵鸞群仙集兮祥雲聚天樂鏗鍧聲四舉滴瀝金漿帶露傾婆娑丹鳳和雲舞素容潜溢兮朱顔酡獻酬交錯兮歡何多夫人顧我兮歌短歌聖賢莫若丘與軻借問丘軻今何在空留塚墓高嵯峨前豪後傑循一轍溺名濤兮沈利波甘隨石火風燈去莫有栖心追大羅紅塵此日佳吾子擺落浮榮如脫屣向來虔奉玉宸言爲君析理長生事君不見古皇問道崆峒室雖得宏綱未全悉回頭蜀國訪峨眉天真皇人與真一真一之道何所云莫若先敲戊己門戊己門中有金子金子便是黄芽根黄芽根爲萬物母母得子兮爲鼎釜日月魂華交感時一浮一沈珠自飛明珠飛到崑崙上子若求之憑罔象得之歸來歸絳宫絳宫蒸入肌膚紅肌膚紅鬢髮黑北斗由兹落死籍大哉九十日成功髣髴喬山有遺跡又不聞叔通從事魏伯陽相將笑入無何郷准連山作參同契留爲萬古丹中王首曰乾坤易門户乾道男兮坤道女世人不識真隂陽茫茫天下尋龍虎日爲離月爲坎日月爲易相吞啖金烏死玉鬼生萬物生因天地感天地氤氲男女姤四象五行憑輻輳晝夜屯蒙法自然焉用孜孜看火候採有時取有日採兮取兮須愼宻勿使驪龍驚覺來天真喪去明珠失萬一留心契上清上清非道胡能昇眼前有路不知處造空伏死徒冥㝠返精内視爲團空臍下强名太一宫先想神爐峙乎内次存真火炎其中常當半夜子時起採日月華投鼎裏妄將津液號金精漱下丹田作神水自云沖妙符希夷脫胎十月生嬰兒勞神疲思良可歎往往容色先人衰有烹金石爲九還砂中抽汞丹取鉛團作一斤安土釜炎炎凡火相烹煎其中方色各歸一依稀亦有黄芽出似是而非迷殺人往往餌之成痼疾忽斷鹽忽斷穀或陽兮孤栖或隂兮寡宿或向隅而坐忘遺照或遁跡兮深山窮谷或餌便溺爲九還或鍊桑灰爲大丹或隂採兮復陽採泝精氣兮衝泥丸何事千岐并萬路埋没眞詮無覓處羣仙拍手笑方歸人間四大颯然悟悟來嘿嘿心自知騰騰兀兀都無機信哉端坐盤陀石始覺奇之又怪之嘗聞古仙有遺語深山不是修眞所許碏長尋偃月爐遊遍雄都并會府二年出處當京國求箇同人求不得遍歷英才與隻才未嘗失口談眞寂有客通衢情忽忽雙睛激電如驚鶻渾渾行當羣小間鷄中一鶴孤突兀迤邐潜隨復潜視神骨雖奇容色悴此必高才下位人揖坐從容詢姓氏答我江陵王者孫祖先世列荆南君旋屬建隆眞主出忻然納璽稱蕃臣我昔少年心膽雄文場一戰魁羣公豈思一射失前望武陵曾薦阿房宫蹤跡因玆沈下吏九品公裳青窣地折腰趨入謁刺史階下一拜不如死早是徒勞顧飄蕩那堪枉被相誣罔由賴漢昭明霍光得全首領歸南陽旋辱天王霈恩渥一命遄催尉西洛自嗟薄命非貴人退歸南海怡天真負郭良田幾百頃禾黍離離墮雲穎王租輸外有餘儲足養嵇康懶惰性去歲驚聞王御史嘗把文章奏天子向來已决麋鹿心不顧絲綸重及此卧龍諸葛徒權奇今日昇平何所施拂衣安得修仙子九天高約雲爲梯獨步長階方自適喜辱先生問塵跡各當携手登酒樓酒酣高歌豁胷臆武陽鴻鍾百餘列速飲連傾不得歇直宜潑向沃焦山大江須枯海須竭坐中筆我一千言龍門浩浩傾詞源勢决崑崙塞渤澥聲撼天關摇地閽數百言兮何磊落囚龍掣斷黄金索霹靂一聲涇水湄雲中推下馬頭雹數百言兮何高奇虚籟寒生瓊樹枝誰將宋玉倚天劎秋空截斷雙虹蜺數百言兮何清苦霜猿斗月月當午霸陵衰柳怯秋風金谷殘花愁暮雨數百言兮何達觀萬象强名聲一斷大哉真覺覺來心一切聖賢拂如電雄哉樸凸歌中毫寳之未敢呈吾曹正當羣士急牋縋紙價恐增朝夕高奇君手有謫仙筆奇君身有謫仙骨吾皇豐爵安得糜蛟龍不是池中物我有赤龍天上訣有口人間未曾說奇君雄負天仙才不惜天機爲君泄庸兒莫笑作虚狂爲君一躍大羅月眞人高象先金丹歌
